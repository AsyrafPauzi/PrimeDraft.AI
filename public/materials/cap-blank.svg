<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 320" fill="none">
  <rect width="500" height="320" fill="#f7f6f2"/>

  <!-- Cap crown -->
  <path
    d="M 88,228
       C 88,128 132,52 250,44
       C 368,52 412,128 412,228
       Z"
    fill="white"
    stroke="#222"
    stroke-width="2.5"
    stroke-linejoin="round"
  />

  <!-- Cap brim -->
  <path
    d="M 84,228
       L 412,228
       L 430,222
       C 444,216 445,203 430,198
       L 390,196
       Q 270,262 88,220
       L 84,228 Z"
    fill="#ece9e4"
    stroke="#222"
    stroke-width="2.5"
    fill-rule="evenodd"
    stroke-linejoin="round"
  />

  <!-- Brim underside detail -->
  <path
    d="M 89,222 Q 250,255 408,222"
    fill="none"
    stroke="#ccc"
    stroke-width="1"
  />

  <!-- Sweatband stitch line -->
  <path
    d="M 91,221 C 152,208 348,208 409,221"
    fill="none"
    stroke="#ddd"
    stroke-width="1.5"
    stroke-dasharray="5,4"
  />

  <!-- Center seam -->
  <line x1="250" y1="46" x2="250" y2="226" stroke="#e0e0e0" stroke-width="1.5" stroke-dasharray="6,5"/>

  <!-- Button on top -->
  <circle cx="250" cy="48" r="9" fill="white" stroke="#888" stroke-width="1.5"/>

  <!-- Panel seams left -->
  <path d="M 250,48 Q 140,90 92,220" fill="none" stroke="#e8e8e8" stroke-width="1"/>
  <!-- Panel seams right -->
  <path d="M 250,48 Q 360,90 408,220" fill="none" stroke="#e8e8e8" stroke-width="1"/>

  <!-- Dashed print area box -->
  <rect
    x="172" y="82" width="156" height="118"
    rx="5"
    fill="none"
    stroke="#b0b0b0"
    stroke-width="1.5"
    stroke-dasharray="9,5"
  />

  <!-- Print area label -->
  <text
    x="250" y="146"
    text-anchor="middle"
    fill="#c8c8c8"
    font-size="11"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    letter-spacing="2"
    font-weight="500"
  >PRINT AREA</text>
</svg>
