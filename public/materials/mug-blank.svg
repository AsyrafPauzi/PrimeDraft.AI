<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none">
  <rect width="500" height="400" fill="#f7f6f2"/>

  <!-- Mug body -->
  <path
    d="M 96,75 L 384,75
       C 390,75 394,80 394,86
       L 394,318
       C 394,324 390,328 384,328
       L 96,328
       C 90,328 86,324 86,318
       L 86,86
       C 86,80 90,75 96,75 Z"
    fill="white"
    stroke="#222"
    stroke-width="2.5"
  />

  <!-- Mug rim top ellipse -->
  <ellipse cx="240" cy="75" rx="154" ry="19" fill="white" stroke="#222" stroke-width="2.5"/>

  <!-- Mug bottom ellipse (shadow/base) -->
  <ellipse cx="240" cy="328" rx="154" ry="13" fill="#ece9e4" stroke="#222" stroke-width="2.5"/>

  <!-- Handle outer curve -->
  <path
    d="M 394,145 C 458,145 485,168 485,200 C 485,232 458,255 394,255"
    fill="none"
    stroke="#222"
    stroke-width="2.5"
    stroke-linecap="round"
  />
  <!-- Handle inner curve -->
  <path
    d="M 394,168 C 445,168 462,182 462,200 C 462,218 445,232 394,232"
    fill="none"
    stroke="#bbb"
    stroke-width="1"
    stroke-linecap="round"
  />

  <!-- Dashed print area box -->
  <rect
    x="126" y="112" width="210" height="172"
    rx="5"
    fill="none"
    stroke="#b0b0b0"
    stroke-width="1.5"
    stroke-dasharray="9,5"
  />

  <!-- Print area label -->
  <text
    x="231" y="202"
    text-anchor="middle"
    fill="#c8c8c8"
    font-size="11"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    letter-spacing="2"
    font-weight="500"
  >PRINT AREA</text>
</svg>
